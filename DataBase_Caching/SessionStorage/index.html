<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Storage Todo App</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        max-width: 400px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 5px;
      }

      .subtitle {
        font-size: 0.9rem;
        color: gray;
        margin-bottom: 20px;
      }

      .input-group {
        display: flex;
        margin-bottom: 20px;
      }

      input[type="text"] {
        flex: 1;
        padding: 8px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      .todo-list {
        list-style-type: none;
        padding: 0;
      }

      .todo-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border: 1px solid #ccc;
        margin-bottom: 5px;
        background: #f9f9f9;
      }

      .remove-btn {
        color: red;
      }

      .empty-state {
        color: gray;
        font-style: italic;
        display: none;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Session Checklist</h1>
      <p class="subtitle">Data clears when you close this browser tab</p>

      <div class="input-group">
        <input
          type="text"
          id="todoInput"
          placeholder="What needs to be done?"
          autocomplete="off"
        />
        <button id="addBtn">Add</button>
      </div>

      <ul id="todoList" class="todo-list"></ul>
      <div id="emptyState" class="empty-state">
        No todos yet. Add one above!
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
