<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Storage Theme Toggle</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #333333;
        --btn-bg: #3498db;
        --btn-text: #ffffff;
      }

      /* Dark Mode Theme Variables */
      body.dark-mode {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --btn-bg: #e74c3c;
        --btn-text: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .container {
        text-align: center;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        background-color: rgba(
          128,
          128,
          128,
          0.1
        ); /* Slightly offset from body bg */
      }

      h1 {
        margin-bottom: 2rem;
      }

      .btn-group {
        display: flex;
        gap: 1rem;
        justify-content: center;
      }

      button {
        padding: 12px 24px;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background-color: var(--btn-bg);
        color: var(--btn-text);
        transition:
          opacity 0.2s,
          transform 0.1s;
      }

      button:hover {
        opacity: 0.9;
      }

      button:active {
        transform: scale(0.98);
      }

      #clearBtn {
        background-color: #95a5a6; /* Neutral color for clear button */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Local Storage Demo</h1>
      <div class="btn-group">
        <button id="themeToggleBtn">Set Dark Mode</button>
        <button id="clearBtn">Clear Local Storage</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
