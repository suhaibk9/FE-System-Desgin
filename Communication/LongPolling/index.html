<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="currentData"></div>
    <script>
      let currentData = null;

      const getData = async () => {
        const res = await fetch(
          `http://localhost:3000/data?data=${currentData}`,
        );
        const json = await res.json();
        currentData = json.msg;
        document.querySelector("#currentData").innerHTML = currentData;
        getData();
      };
      getData();
    </script>
  </body>
</html>
