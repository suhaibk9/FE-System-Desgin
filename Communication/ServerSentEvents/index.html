<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="sse-data"></div>
    <script>
      const evt = new EventSource("http://localhost:3001/sse");
      evt.onmessage = (event) => {
        console.log(event);
        document.getElementById("sse-data").textContent = event.data;
      };
    </script>
  </body>
</html>
