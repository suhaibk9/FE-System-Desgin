<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Secure Bank</title>
  <style>
    body { font-family: Arial; padding: 50px; background: #f4f4f4; }
    .card { background: white; padding: 20px; border-radius: 8px; width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="card">
    <h2>Transfer Money</h2>
    
    <form action="/transfer" method="POST">
      
      <label>Amount:</label><br>
      <input type="text" name="amount" value="1000"><br><br>

      <label>Send To:</label><br>
      <input type="text" name="to" value="John Doe"><br><br>

      <input type="hidden" name="csrf_token" value="{{CSRF_TOKEN}}">

      <button type="submit" style="background: blue; color: white; padding: 10px; width: 100%;">Send Money</button>
    </form>
  </div>

</body>
</html>
