<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    #legit-iframe {
      opacity: 0;
      position: absolute;
      top: 1px;
      left: 1px;
    }
  </style>
  <body>
    <h1>Example of ClickJacking</h1>
    <p>Click on button to ClickJack</p>
    <button id="overlay-button">Click Me!</button>
    <iframe src="http://localhost:3002/iFrame1" id="legit-iframe"></iframe>
    <script>
      document.querySelector("#overlay-button").addEventListener("click", () => {
        alert("CLICK ME CLICKED");
      });
    </script>
  </body>
</html>
