<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow DOM Example</title>
  <style>
    /* Global CSS intended to style all <p> tags red */
    p {
      color: red;
      font-size: 18px;
      font-family: sans-serif;
    }

    body {
      padding: 20px;
      background-color: #f4f4f4;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>1. The Normal DOM</h2>
    <!-- This paragraph WILL be affected by the global red CSS -->
    <p>I am a normal paragraph outside the Shadow DOM. The global CSS makes me RED.</p>
  </div>

  <div class="container">
    <h2>2. The Shadow DOM Bunker</h2>
    <!-- This is the host element for our Shadow DOM -->
    <div id="secret-bunker"></div>
  </div>

  <script>
    // 1. Find the host element
    const hostElement = document.getElementById("secret-bunker");

    // 2. Attach the Shadow DOM (This creates the invisible forcefield)
    const shadowRoot = hostElement.attachShadow({ mode: "open" });

    // 3. Inject our secret HTML and CSS directly into the bunker
    shadowRoot.innerHTML = `
      <style>
        /* This CSS is completely trapped inside the bunker! */
        p { 
          color: blue; 
          border: 2px solid black;
          padding: 10px;
          background-color: #e0f7fa;
          font-family: monospace;
        }
      </style>
      
      <p>I am inside the Shadow DOM! I am BLUE. The global red CSS cannot touch me!</p>
    `;
  </script>
</body>
</html>
