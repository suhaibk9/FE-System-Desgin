<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Listing</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f7f9fc;
        color: #333;
        padding: 40px 20px;
      }
      h1 {
        text-align: center;
        margin-bottom: 40px;
        font-size: 2.5rem;
        color: #2c3e50;
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 30px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .product-card {
        background: #ffffff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        text-align: center;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
      }
      .product-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .product-title {
        font-size: 1.2rem;
        margin-bottom: 10px;
        color: #2c3e50;
      }
      .product-price {
        font-weight: bold;
        color: #e74c3c;
        font-size: 1.3rem;
        margin-bottom: 20px;
      }
      .add-to-cart {
        background: #3498db;
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: background 0.3s;
      }
      .add-to-cart:hover {
        background: #2980b9;
      }
    </style>
  </head>
  <body>
    <h1>Featured Products</h1>
    <div class="product-grid">
      <!-- Product 1 -->
      <div class="product-card">
        <img
          src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=600&q=80"
          alt="Audio"
          class="product-image"
        />
        <h2 class="product-title">Wireless Headphones</h2>
        <div class="product-price">$99.99</div>
        <button class="add-to-cart">Add to Cart</button>
      </div>

  </body>
